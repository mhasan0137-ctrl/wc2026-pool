name: Update WC 2026 pool

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (UTC). During match days you can lower this.
  workflow_dispatch: {}      # lets you run it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tracker
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}   # optional; skips gracefully if unset
        run: python3 wc_tracker.py --players
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
